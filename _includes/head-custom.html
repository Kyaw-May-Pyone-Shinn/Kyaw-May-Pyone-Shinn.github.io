<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        bg: "#100914",
        surface: "rgba(255,255,255,0.06)",
        surfaceStrong: "rgba(255,255,255,0.10)",
        border: "rgba(255,255,255,0.13)",
        text: "#fff7fb",
        muted: "#d9c4d1",
        soft: "#fce7f3",
        primary: "#ec4899",
        secondary: "#d946ef",
        accent: "#fb7185",
        gold: "#fbbf24"
      },
      boxShadow: {
        glow: "0 20px 70px rgba(236,72,153,0.28)",
        card: "0 18px 50px rgba(0,0,0,0.35)"
      }
    }
  }
}
</script>

<style>
html {
  scroll-behavior: smooth;
  scroll-padding-top: 90px;
}

body {
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at 10% 10%, rgba(236,72,153,0.22), transparent 32%),
    radial-gradient(circle at 88% 12%, rgba(217,70,239,0.18), transparent 34%),
    radial-gradient(circle at 50% 100%, rgba(251,113,133,0.12), transparent 35%),
    #100914;
}

.nav-link {
  position: relative;
  transition: all 0.25s ease;
}

.nav-link:hover,
.nav-link.active {
  color: #f472b6;
}

.nav-link.active::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -8px;
  width: 100%;
  height: 2px;
  border-radius: 999px;
  background: linear-gradient(to right, #ec4899, #d946ef, #fb7185);
}

.glass {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.13);
  box-shadow: 0 18px 50px rgba(0,0,0,0.35);
  backdrop-filter: blur(18px);
}

.gradient-text {
  background: linear-gradient(90deg, #f9a8d4, #ec4899, #d946ef, #fb7185);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.section-label {
  display: inline-flex;
  align-items: center;
  gap: 0.55rem;
  color: #f9a8d4;
  font-weight: 800;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-size: 0.78rem;
}

.section-label::before {
  content: "";
  width: 36px;
  height: 2px;
  background: linear-gradient(to right, #ec4899, #d946ef);
  border-radius: 999px;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const roles = [
    "Data Analyst",
    "Business Analyst",
    "Business Intelligence Analyst",
    "Analytics Consultant",
    "CRM & BI Analyst"
  ];

  let i = 0;
  const el = document.getElementById("rotating-role");

  if (el) {
    setInterval(() => {
      el.style.opacity = 0;
      setTimeout(() => {
        i = (i + 1) % roles.length;
        el.textContent = roles[i];
        el.style.opacity = 1;
      }, 260);
    }, 2300);
  }

  const sections = document.querySelectorAll("section[id]");
  const navLinks = document.querySelectorAll(".nav-link");

  const observer = new IntersectionObserver(
    entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          navLinks.forEach(link => {
            link.classList.remove("active");
            if (link.getAttribute("href") === "#" + entry.target.id) {
              link.classList.add("active");
            }
          });
        }
      });
    },
    { threshold: 0.45 }
  );

  sections.forEach(section => observer.observe(section));
});
</script>
