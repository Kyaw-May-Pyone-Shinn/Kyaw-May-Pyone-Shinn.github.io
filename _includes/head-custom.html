<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        page: "#f8fafc",
        ink: "#0f172a",
        muted: "#475569",
        soft: "#64748b",
        card: "#ffffff",
        line: "#e2e8f0",
        rose: "#e11d48",
        roseDark: "#be123c",
        blush: "#fff1f2",
        navy: "#1e293b"
      },
      boxShadow: {
        soft: "0 18px 45px rgba(15, 23, 42, 0.08)",
        small: "0 8px 22px rgba(15, 23, 42, 0.06)"
      }
    }
  }
}
</script>

<style>
html {
  scroll-behavior: smooth;
  scroll-padding-top: 92px;
}

body {
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at 10% 10%, rgba(225, 29, 72, 0.08), transparent 30%),
    radial-gradient(circle at 90% 5%, rgba(190, 18, 60, 0.07), transparent 28%),
    #f8fafc;
}

.nav-link {
  position: relative;
  transition: color 0.2s ease;
}

.nav-link:hover,
.nav-link.active {
  color: #e11d48;
}

.nav-link.active::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -8px;
  width: 100%;
  height: 2px;
  border-radius: 999px;
  background: #e11d48;
}

.section-kicker {
  color: #e11d48;
  font-size: 0.78rem;
  font-weight: 800;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.card {
  background: #ffffff;
  border: 1px solid #e2e8f0;
  box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
}

.role-fade {
  transition: opacity 0.25s ease;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const roles = [
    "Data Analyst",
    "Business Analyst",
    "Business Intelligence Analyst",
    "Analytics Consultant",
    "CRM & BI Analyst"
  ];

  let i = 0;
  const roleElement = document.getElementById("rotating-role");

  if (roleElement) {
    setInterval(() => {
      roleElement.style.opacity = 0;
      setTimeout(() => {
        i = (i + 1) % roles.length;
        roleElement.textContent = roles[i];
        roleElement.style.opacity = 1;
      }, 250);
    }, 2200);
  }

  const sections = document.querySelectorAll("section[id]");
  const navLinks = document.querySelectorAll(".nav-link");

  const observer = new IntersectionObserver(
    entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          navLinks.forEach(link => {
            link.classList.remove("active");
            if (link.getAttribute("href") === "#" + entry.target.id) {
              link.classList.add("active");
            }
          });
        }
      });
    },
    { threshold: 0.45 }
  );

  sections.forEach(section => observer.observe(section));
});
</script>
