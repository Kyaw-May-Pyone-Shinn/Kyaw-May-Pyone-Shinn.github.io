<!-- AUTO TEXT ROTATION SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", function () {
  const roles = [
    "Data Analyst",
    "Business Analyst",
    "Business Intelligence Analyst",
    "Consultant"
  ];

  let i = 0;
  const el = document.getElementById("rotating-role");

  function rotateText() {
    el.style.opacity = 0;
    setTimeout(() => {
      i = (i + 1) % roles.length;
      el.textContent = roles[i];
      el.style.opacity = 1;
    }, 300);
  }

  setInterval(rotateText, 2500);
});
</script>
