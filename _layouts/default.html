<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% seo %}
  {% include head-custom.html %}
</head>

<body class="text-text">

<header class="sticky top-0 backdrop-blur bg-black/40 border-b border-border z-50">
  <div class="max-w-6xl mx-auto px-4 flex justify-between items-center h-16">
    
    <div class="flex items-center gap-2 font-bold">
      <div class="w-8 h-8 rounded-xl bg-gradient-to-r from-brand to-accent flex items-center justify-center text-white">◆</div>
      {{ site.title }}
    </div>

    <nav class="flex gap-6 text-muted font-semibold">
      <a href="#about" class="hover:text-text">About</a>
      <a href="#skills" class="hover:text-text">Skills</a>
      <a href="#projects" class="hover:text-text">Projects</a>
      <a href="#experience" class="hover:text-text">Experience</a>
      <a href="/contact" class="hover:text-text">Contact</a>
    </nav>

  </div>
</header>

<main>
  {{ content }}
</main>

<footer class="border-t border-border mt-20 py-10">
  <div class="max-w-6xl mx-auto px-4 flex justify-between flex-wrap gap-6 text-muted">
    <div>
      <h4 class="font-bold text-text">{{ site.title }}</h4>
      <p>{{ site.description }}</p>
    </div>

    <div class="flex gap-4">
      <a href="{{ site.data.profile.linkedin }}">LinkedIn</a>
      <a href="{{ site.data.profile.github }}">GitHub</a>
    </div>
  </div>
</footer>

</body>
</html>
